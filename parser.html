<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Note Parser Pro - Dashboard UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-purple-200 to-pink-300 text-slate-800 p-4"
    style="font-family: 'Saira', sans-serif;">
    <nav
        class="sticky top-4 z-50 mx-auto mb-5 w-[min(1220px,calc(100vw-2rem))] rounded-2xl border border-white/60 bg-white/65 px-4 py-3 shadow-[0_14px_30px_rgba(122,120,168,0.14)] backdrop-blur-xl">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <a href="index.html" class="flex items-center gap-2 text-sm font-extrabold tracking-wide text-slate-800">
                <span
                    class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-[linear-gradient(135deg,#f8b8d7,#b7dfff)] text-slate-800 shadow-sm">
                    <i class="fa-solid fa-house"></i>
                </span>
                Note Hub
            </a>
            <div class="flex flex-wrap items-center gap-2 text-sm font-semibold">
                <a href="index.html" class="rounded-xl px-3 py-2 text-slate-700 hover:bg-white/80">Home</a>
                <a href="parser.html" class="rounded-xl bg-white px-3 py-2 text-slate-800 shadow-sm">Parser</a>
                <a href="viewer.html" class="rounded-xl px-3 py-2 text-slate-700 hover:bg-white/80">Viewer</a>
                <a href="question-maker.html" class="rounded-xl px-3 py-2 text-slate-700 hover:bg-white/80">Question
                    Maker</a>
            </div>
        </div>
    </nav>

    <div class="mx-auto flex w-[min(1220px,calc(100vw-2rem))] items-start gap-4">
        <div id="dashboard"
            class="w-1/3 max-w-80 sticky top-4 h-[calc(100vh-2rem)] overflow-y-auto bg-blue-200 p-4 rounded-xl shadow space-y-4">
            <div class="flex items-center justify-between gap-2">
                <h1 class="text-xl font-bold mb-2">Dashboard</h1>
                <a href="index.html"
                    class="px-3 py-1 bg-slate-100 text-slate-700 rounded-lg shadow text-xs font-semibold hover:bg-white">Home</a>
            </div>
            <div>
                <div class="mb-3 grid grid-cols-1 gap-2">
                    <div>
                        <label for="classNameInput"
                            class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-600">Class</label>
                        <input id="classNameInput" type="text" onkeydown="commitMetadataField(event, 'className', this)"
                            class="w-full rounded-lg border border-white/70 bg-white/80 px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm outline-none ring-0 placeholder:text-slate-400"
                            placeholder="Class">
                    </div>
                    <div>
                        <label for="chapterNumberInput"
                            class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-600">Chapter
                            Number</label>
                        <input id="chapterNumberInput" type="text"
                            onkeydown="commitMetadataField(event, 'chapterNumber', this)"
                            class="w-full rounded-lg border border-white/70 bg-white/80 px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm outline-none ring-0 placeholder:text-slate-400"
                            placeholder="Chapter number">
                    </div>
                    <div>
                        <label for="chapterTitleInput"
                            class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-600">Chapter
                            Title</label>
                        <input id="chapterTitleInput" type="text"
                            onkeydown="commitMetadataField(event, 'chapterTitle', this)"
                            class="w-full rounded-lg border border-white/70 bg-white/80 px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm outline-none ring-0 placeholder:text-slate-400"
                            placeholder="Chapter title">
                    </div>
                </div>
                <div id="report" class="p-2 bg-slate-100 rounded-lg text-slate-800 font-semibold flex flex-col gap-2">
                </div>
            </div>
            <div class="mt-3 flex flex-col gap-2">
                <button id="parseBtn" onclick="parseAll(this)"
                    class="w-full bg-blue-500 text-white px-4 py-2 rounded-lg action-btn">
                    <span class="btn-label">Parse</span>
                </button>
                <button id="copyBtn" onclick="copyJSON(this)"
                    class="w-full bg-green-500 text-white px-4 py-2 rounded-lg action-btn">
                    <span class="btn-label">Copy JSON</span>
                </button>
                <button id="downloadBtn" onclick="downloadJSON(this)"
                    class="w-full bg-purple-500 text-white px-4 py-2 rounded-lg action-btn">
                    <span class="btn-label">Download</span>
                </button>
                <button id="openNotesBtn" onclick="window.location.href='viewer.html'"
                    class="w-full bg-amber-500 text-white px-4 py-2 rounded-lg action-btn">
                    <span class="btn-label">Open Notes</span>
                </button>
                <button id="pushBtn" onclick="startPushFlow(this)"
                    class="w-full bg-sky-500 text-white px-4 py-2 rounded-lg action-btn">
                    <span class="btn-label">Push To Data</span>
                </button>
                <button id="clearBtn" onclick="clearAll(this)"
                    class="w-full bg-red-500 text-white px-4 py-2 rounded-lg action-btn">
                    <span class="btn-label">Clear</span>
                </button>
            </div>
        </div>

        <div class="flex-1 space-y-4">
            <div class="grid grid-cols-1 gap-4">
                <div class="w-full">
                    <label for="inputText" class="font-medium">Whole Note:</label>
                    <textarea id="inputText" class="w-full mt-2 p-3 bg-white rounded-lg shadow bnFont" rows="12"
                        placeholder="Paste the whole note..."></textarea>
                </div>
            </div>
            <div id="output" class="space-y-4"></div>
        </div>

        <div id="confirmModal" class="fixed inset-0 bg-[rgba(0,0,0,0.6)] flex items-center justify-center hidden z-50">
            <div class="bg-white p-6 rounded-lg shadow-lg max-w-sm w-full mx-4">
                <h2 id="confirmModalTitle" class="text-lg font-semibold mb-4">Confirm Action</h2>
                <p id="confirmModalText" class="mb-4">Are you sure?</p>
                <div class="flex justify-end gap-2">
                    <button id="cancelDelete"
                        class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">Cancel</button>
                    <button id="confirmDelete"
                        class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-700 action-btn">
                        <span class="btn-label">Confirm</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="notificationBanner"
            class="fixed bottom-4 left-4 min-w-72 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden z-40">
            <span id="bannerText"></span>
        </div>

        <script src="./parser.js"></script>
</body>

</html>
