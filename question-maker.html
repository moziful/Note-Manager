<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Question Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-purple-200 to-pink-300 text-slate-800 p-4" style="font-family: 'Saira', sans-serif;">
    <nav class="sticky top-4 z-50 mx-auto mb-5 w-[min(1220px,calc(100vw-2rem))] rounded-2xl border border-white/60 bg-white/65 px-4 py-3 shadow-[0_14px_30px_rgba(122,120,168,0.14)] backdrop-blur-xl">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <a href="index.html" class="flex items-center gap-2 text-sm font-extrabold tracking-wide text-slate-800">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-[linear-gradient(135deg,#f8b8d7,#b7dfff)] text-slate-800 shadow-sm">
                    <i class="fa-solid fa-house"></i>
                </span>
                Note Hub
            </a>
            <div class="flex flex-wrap items-center gap-2 text-sm font-semibold">
                <a href="index.html" class="rounded-xl px-3 py-2 text-slate-700 hover:bg-white/80">Home</a>
                <a href="parser.html" class="rounded-xl px-3 py-2 text-slate-700 hover:bg-white/80">Parser</a>
                <a href="viewer.html" class="rounded-xl px-3 py-2 text-slate-700 hover:bg-white/80">Viewer</a>
                <a href="question-maker.html" class="rounded-xl bg-white px-3 py-2 text-slate-800 shadow-sm">Question Maker</a>
            </div>
        </div>
    </nav>

    <div class="mx-auto flex w-[min(1220px,calc(100vw-2rem))] items-start gap-4">
        <aside class="w-1/3 max-w-88 sticky top-4 h-[calc(100vh-2rem)] overflow-y-auto bg-blue-200 p-4 rounded-xl shadow space-y-4">
            <div class="flex items-center justify-between gap-2">
                <h1 class="text-xl font-bold">Question Maker</h1>
                <a href="index.html" class="px-3 py-1 bg-slate-100 text-slate-700 rounded-lg shadow text-xs font-semibold hover:bg-white">Home</a>
            </div>

            <div class="p-3 bg-slate-100 rounded-lg space-y-2">
                <label class="block text-sm font-semibold">Class</label>
                <div id="qmClassSelectors" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="p-3 bg-slate-100 rounded-lg space-y-2">
                <div class="flex items-center justify-between">
                    <label class="block text-sm font-semibold">Chapters</label>
                    <button id="toggleAllChaptersBtn" class="text-xs px-2 py-1 bg-white rounded">Toggle All</button>
                </div>
                <div id="qmChapterList" class="space-y-2 text-sm"></div>
            </div>

            <div class="p-3 bg-slate-100 rounded-lg space-y-3">
                <label class="block text-sm font-semibold">Full Mark</label>
                <div id="fullMarkSelectors" class="flex flex-wrap gap-2"></div>

                <label class="block text-sm font-semibold">Paper Hardness</label>
                <div id="paperHardnessSelectors" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="p-3 bg-slate-100 rounded-lg space-y-3">
                <div class="text-sm font-semibold">Question Counts</div>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <label>MCQ <input id="countMcq" type="number" value="20" min="0" class="mt-1 w-full rounded bg-white px-2 py-1"></label>
                    <label>Blank <input id="countBlanks" type="number" value="10" min="0" class="mt-1 w-full rounded bg-white px-2 py-1"></label>
                    <label>Short <input id="countShorts" type="number" value="12" min="0" class="mt-1 w-full rounded bg-white px-2 py-1"></label>
                    <label>Word <input id="countWords" type="number" value="11" min="0" class="mt-1 w-full rounded bg-white px-2 py-1"></label>
                    <label>Geometry <input id="countGeometry" type="number" value="2" min="0" class="mt-1 w-full rounded bg-white px-2 py-1"></label>
                </div>
            </div>

            <div id="qmReport" class="p-3 bg-slate-100 rounded-lg text-sm font-semibold space-y-2"></div>

            <button id="generatePaperBtn" class="w-full bg-purple-500 text-white px-4 py-3 rounded-lg action-btn">
                <span class="btn-label">Generate Paper</span>
            </button>
        </aside>

        <main class="flex-1 space-y-4">
            <section id="qmOutput" class="space-y-4"></section>
        </main>
    </div>

    <div id="notificationBanner" class="fixed bottom-4 left-4 min-w-72 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden z-40">
        <span id="bannerText"></span>
    </div>

    <script src="question-maker.js"></script>
</body>

</html>
