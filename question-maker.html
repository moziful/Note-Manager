<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Question Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Hide scrollbar but keep scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari */
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE, Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body class="h-screen p-2 bg-gradient-to-br from-purple-200 to-pink-300 text-slate-800"
    style="font-family: 'Saira', sans-serif;">
    <nav
        class="sticky top-1 z-50 mx-auto mb-3 w-[min(1220px,calc(100vw-2rem))] h-12 rounded-lg border border-white/60 bg-white/65 px-2 shadow-[0_14px_30px_rgba(122,120,168,0.14)] backdrop-blur-xl">
        <div class="h-full flex flex-wrap justify-between items-center gap-3">
            <a href="index.html" class="flex items-center gap-2 text-sm font-extrabold tracking-wide text-slate-800">
                <span
                    class="inline-flex h-8 w-24 items-center justify-center rounded-lg bg-[linear-gradient(135deg,#f8b8d7,#b7dfff)] text-slate-800 shadow-sm">
                    <i class="fa-solid fa-house"></i>Note Hub
                </span>

            </a>
            <div class="flex flex-wrap items-center gap-2 text-sm font-semibold">
                <a href="index.html" class="rounded-md px-3 py-1 text-slate-700 hover:bg-white/80">Home</a>
                <a href="parser.html" class="rounded-md px-3 py-1 text-slate-700 hover:bg-white/80">Parser</a>
                <a href="viewer.html" class="rounded-md px-3 py-1 text-slate-700 hover:bg-white/80">Viewer</a>
                <a href="question-maker.html" class="rounded-md bg-white px-3 py-1 text-slate-800 shadow-sm">Question
                    Maker</a>
            </div>
        </div>
    </nav>

    <div class="mx-auto flex w-[min(1220px,calc(100vw-2rem))] items-start gap-4">
        <div
            class="w-1/3 max-w-88 h-162 overflow-y-auto no-scrollbar sticky top-3 bg-blue-200 p-2 rounded-xl shadow space-y-2">
            <div class="flex items-center justify-between gap-2">
                <h1 class="text-xl font-bold">Create Question</h1>
            </div>
            <!-- Class seslector -->
            <div class="p-1 bg-slate-100 rounded-lg">
                <label class="block text-sm font-semibold">Class</label>
                <div id="qmClassSelectors" class="grid grid-cols-2 gap-2"></div>
            </div>
            <!-- Chapter Checkbox -->
            <div class="p-1 bg-slate-100 rounded-lg space-y-1">
                <div class="flex items-center justify-between">
                    <label class="block text-sm font-semibold">Chapters</label>
                    <button id="toggleAllChaptersBtn" class="text-xs px-2 py-1 bg-white rounded-sm">All</button>
                </div>
                <div id="qmChapterList" class="space-y-1 text-sm h-35 overflow-y-auto no-scrollbar"></div>
            </div>
            <!-- Mark and Hardness -->
            <div class="p-1 bg-slate-100 rounded-lg space-y-1">
                <label class="block text-sm font-semibold">Full Mark</label>
                <div id="fullMarkSelectors" class="grid grid-cols-2 gap-2"></div>

                <label class="block text-sm font-semibold">Paper Hardness</label>
                <div id="paperHardnessSelectors" class="grid grid-cols-1 md:grid-cols-3 gap-2"></div>
            </div>
            <!-- Question Counts -->
            <div class="p-1 bg-slate-100 rounded-lg space-y-1">
                <div class="text-sm font-semibold">Question Counts</div>
                <div class="grid grid-cols-3 gap-2 text-sm">
                    <div class="flex bg-white rounded-sm px-3">
                        <label>MCQ: </label>
                        <input id="countMcq" type="number" value="20" min="0" class="w-full rounded px-2">
                    </div>
                    <div class="flex bg-white rounded-sm px-3">
                        <label>Blank: </label>
                        <input id="countBlanks" type="number" value="10" min="0" class="w-full rounded bg-white px-2">
                    </div>
                    <div class="flex bg-white rounded-sm px-3">
                        <label>Short: </label>
                        <input id="countShorts" type="number" value="12" min="0" class="w-full rounded bg-white px-2">
                    </div>
                    <div class="flex bg-white rounded-sm px-3">
                        <label>Word: </label>
                        <input id="countWords" type="number" value="11" min="0" class="w-full rounded bg-white px-2">
                    </div>
                    <div class="flex bg-white rounded-sm px-3 col-span-2">
                        <label>Geometry: </label>
                        <input id="countGeometry" type="number" value="2" min="0" class="w-full rounded bg-white px-2">
                    </div>

                </div>
            </div>
            <!-- Report -->
            <div id="qmReport" class="p-1 bg-slate-100 rounded-lg text-sm space-y-2"></div>
            <!-- Button -->
            <button id="generatePaperBtn" class="w-full bg-purple-500 text-white px-4 py-3 rounded-lg action-btn">
                <span class="btn-label">Generate Paper</span>
            </button>
        </div>

        <main class="flex-1 space-y-4">
            <section id="qmOutput" class="space-y-4"></section>
        </main>
    </div>

    <div id="notificationBanner"
        class="fixed bottom-4 left-4 min-w-72 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden z-40">
        <span id="bannerText"></span>
    </div>

    <script src="question-maker.js"></script>
</body>

</html>
